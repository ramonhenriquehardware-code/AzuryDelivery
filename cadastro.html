<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AZURY</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <header>
        <a href="index.html" class="logo">
            <img src="Imagens/Coroa.png" alt="Azury">
            AZURY
        </a>
    </header>

    <main class="login-container">

        <div class="login-card">

            <div class="marca-dagua">👑</div>

            <div class="logo-login">
                👑
            </div>

            <h1>AZURY</h1>

            <span class="login-badge">
                ✨ Novo Cliente
            </span>

            <h2>Criar Conta</h2>

            <p class="descricao-login">
                Cadastre-se para participar do programa de fidelidade Azury.
            </p>

            <form class="login-form">
                
                <div id="mensagemCadastro" class="mensagem"></div>

                <input type="text" id="nome" placeholder="Nome completo" required>

                <input type="email" id="email" placeholder="Seu e-mail" required>

                <input type="password" id="senha" placeholder="Crie uma senha" required>

                <button type="button" class="btn" id="btnCadastrar">

                    ✨ Criar Conta

                </button>

            </form>

        </div>

    </main>
    <script src="./js/cadastro.js"></script>
</body>

</html>
